name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Security Scan (Mock)
        run: |
          echo "Running security scan..."
          sleep 30  # Simulate ~5 min scan time (reduced for testing)
          echo "Security scan completed"

  backend-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Backend Lint/Test/Build (Mock)
        run: |
          echo "Running backend lint, test, and build..."
          sleep 45  # Simulate ~6 min build time (reduced for testing)
          echo "Backend build completed"

  frontend-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Frontend Lint/Test/Build (Mock)
        run: |
          echo "Running frontend lint, test, and build..."
          sleep 20  # Simulate ~3 min build time (reduced for testing)
          echo "Frontend build completed"

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-test-build, frontend-test-build]
    steps:
      - uses: actions/checkout@v4
      - name: E2E Tests (Mock)
        run: |
          echo "Running E2E tests..."
          sleep 25  # Simulate ~4 min test time (reduced for testing)
          echo "E2E tests completed"

  cdk-synth:
    runs-on: ubuntu-latest
    needs: [security-scan, backend-test-build, frontend-test-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: CDK Synth (Mock)
        run: |
          echo "Running CDK synth..."
          sleep 15  # Simulate ~2 min synth time (reduced for testing)
          echo "CDK synth completed"